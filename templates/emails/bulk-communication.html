<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{subject}}</title>
<style>
  body { margin:0; padding:0; background:#f4f4f4; font-family:Arial,sans-serif; }
  .wrapper { max-width:600px; margin:30px auto; background:#ffffff; border-radius:8px; overflow:hidden; }
  .header { background:#009460; padding:30px; text-align:center; }
  .header h1 { color:#ffffff; margin:0; font-size:22px; letter-spacing:1px; }
  .header p { color:rgba(255,255,255,0.8); margin:8px 0 0; font-size:13px; }
  .body { padding:30px; color:#333333; line-height:1.7; }
  .body h2 { color:#009460; margin-top:0; }
  .content { font-size:15px; }
  .footer { background:#f4f4f4; padding:20px 30px; text-align:center; font-size:12px; color:#999999; }
  .footer a { color:#009460; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>AEESGS</h1>
    <p>Association des Étudiants et Élèves Sénégalais en Guinée et Sous-région</p>
  </div>
  <div class="body">
    <h2>Bonjour {{prenom}} {{nom}},</h2>
    <div class="content">{{content}}</div>
    <p style="margin-top:28px;">Cordialement,<br><strong>L'équipe AEESGS</strong></p>
  </div>
  <div class="footer">
    <p>Ce message est automatique, merci de ne pas y répondre directement.</p>
    <p>Pour toute question : <a href="mailto:contact@aeesgs.org">contact@aeesgs.org</a></p>
  </div>
</div>
</body>
</html>
