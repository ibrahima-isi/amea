<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mot de passe mis à jour</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 24px; color: #1f2937; }
    .container { max-width: 620px; margin: 0 auto; background: #ffffff; border-radius: 8px; padding: 28px; }
    h2 { color: #1a3c6e; margin-top: 0; }
    p { line-height: 1.6; }
    .notice { background: #fff7ed; border-left: 4px solid #f97316; padding: 14px 16px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Bonjour {{prenom}} {{nom}},</h2>
    <p>Votre mot de passe AMEA vient d'être mis à jour.</p>
    <p class="notice">Si vous n'êtes pas à l'origine de cette modification, contactez immédiatement l'administration.</p>
    <p>Ce message ne contient ni mot de passe, ni lien de réinitialisation.</p>
  </div>
</body>
</html>
