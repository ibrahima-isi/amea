name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          APP_URL: ${{ secrets.APP_URL }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DB_HOST,DB_NAME,DB_USER,DB_PASS,APP_URL,MAIL_USER,MAIL_PASS
          script: |
            echo "Début du déploiement..."
            cd ~/repositories/amea
            git fetch origin main
            git reset --hard origin/main

            # Installation des dépendances Composer
            composer install --no-dev --optimize-autoloader
            printf "Order Deny,Allow\nDeny from all\n" > ~/repositories/amea/vendor/.htaccess

            # Synchronisation vers public_html
            rsync -av --delete --exclude='.git' --exclude='.github' --exclude='uploads/' --exclude='.env' ~/repositories/amea/ ~/public_html/

            # Désactiver le listing du dossier uploads/ sans bloquer l'accès aux fichiers
            printf "Options -Indexes\n" > ~/public_html/uploads/.htaccess

            # Écriture sécurisée du fichier .env depuis les secrets GitHub
            printf "DB_HOST=%s\nDB_NAME=%s\nDB_USER=%s\nDB_PASS=%s\nAPP_URL=%s\nMAIL_USER=%s\nMAIL_PASS=%s\n" "$DB_HOST" "$DB_NAME" "$DB_USER" "$DB_PASS" "$APP_URL" "$MAIL_USER" "$MAIL_PASS" > ~/public_html/.env

            # Permissions strictes sur .env (lisible uniquement par le propriétaire)
            chmod 600 ~/public_html/.env

            # Réparation automatique des permissions
            find ~/public_html -type d -exec chmod 755 {} \;
            find ~/public_html -type f -not -name '.env' -exec chmod 644 {} \;

            echo "Déploiement terminé avec succès !"
