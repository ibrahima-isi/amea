name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          APP_URL: ${{ secrets.APP_URL }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DB_HOST,DB_NAME,DB_USER,DB_PASS,APP_URL,MAIL_USER,MAIL_PASS
          script: |
            cd ~/repositories/amea
            git fetch origin main
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader

            rsync -a --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='uploads/' \
              --exclude='.env' \
              ~/repositories/amea/ ~/public_html/

            # S'assurer que .git n'est jamais dans public_html
            rm -rf ~/public_html/.git

            # Déployer le .htaccess de uploads/ (exclu du rsync pour préserver les fichiers uploadés)
            cp ~/repositories/amea/uploads/.htaccess ~/public_html/uploads/.htaccess

            # Protéger vendor/ (généré par composer, absent du repo)
            printf "Options -Indexes\nOrder Deny,Allow\nDeny from all\n" > ~/public_html/vendor/.htaccess

            # Écriture du .env depuis les secrets GitHub
            printf "DB_HOST=%s\nDB_NAME=%s\nDB_USER=%s\nDB_PASS=%s\nAPP_URL=%s\nMAIL_USER=%s\nMAIL_PASS=%s\n" \
              "$DB_HOST" "$DB_NAME" "$DB_USER" "$DB_PASS" "$APP_URL" "$MAIL_USER" "$MAIL_PASS" \
              > ~/public_html/.env
            chmod 600 ~/public_html/.env

            find ~/public_html -type d -exec chmod 755 {} \;
            find ~/public_html -type f -not -name '.env' -exec chmod 644 {} \;
